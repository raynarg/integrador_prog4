<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestión FCAD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles/auth.css">
</head>
<body class="login-page">

    <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
        <div class="card login-card p-4">
            <div class="text-center mb-4">
                <h3 class="fw-bold texto-fcad">FCAD UNER</h3>
                <p class="text-muted">Sistema de Inscripciones</p>
            </div>
            
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Usuario</label>
                    <input type="text" class="form-control" id="username" placeholder="Ingresá tu usuario" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Contraseña</label>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                </div>
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-fcad">Ingresar</button>
                </div>
            </form>
            
            <div class="text-center mt-3">
                <small class="text-muted">¿Olvidaste tu contraseña? Contactá a sistemas.</small>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
